<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(~{::content})}">
<head th:replace="~{layout :: head}"></head>
<body>
    <div th:fragment="content">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Dashboard</h1>
            <p class="text-gray-600">Welcome back! Here's an overview of the system.</p>
        </div>

        <div class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3">
            <!-- Students Card -->
            <div class="bg-white overflow-hidden shadow rounded-lg border border-gray-100 hover:shadow-md transition">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-indigo-500 rounded-md p-3">
                            <i class="fas fa-users text-white text-xl"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Total Students</dt>
                                <dd>
                                    <div class="text-2xl font-semibold text-gray-900" th:text="${studentCount}">0</div>
                                </dd>
                            </dl>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-5 py-3">
                    <div class="text-sm">
                        <a href="/students-ui" class="font-medium text-indigo-600 hover:text-indigo-500">View all</a>
                    </div>
                </div>
            </div>

            <!-- Books Card -->
            <div class="bg-white overflow-hidden shadow rounded-lg border border-gray-100 hover:shadow-md transition">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-emerald-500 rounded-md p-3">
                            <i class="fas fa-book text-white text-xl"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Total Books</dt>
                                <dd>
                                    <div class="text-2xl font-semibold text-gray-900" th:text="${bookCount}">0</div>
                                </dd>
                            </dl>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-5 py-3">
                    <div class="text-sm">
                        <a href="/books-ui" class="font-medium text-emerald-600 hover:text-emerald-500">View all</a>
                    </div>
                </div>
            </div>

            <!-- Courses Card -->
            <div class="bg-white overflow-hidden shadow rounded-lg border border-gray-100 hover:shadow-md transition">
                <div class="p-5">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-amber-500 rounded-md p-3">
                            <i class="fas fa-layer-group text-white text-xl"></i>
                        </div>
                        <div class="ml-5 w-0 flex-1">
                            <dl>
                                <dt class="text-sm font-medium text-gray-500 truncate">Total Courses</dt>
                                <dd>
                                    <div class="text-2xl font-semibold text-gray-900" th:text="${courseCount}">0</div>
                                </dd>
                            </dl>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-5 py-3">
                    <div class="text-sm">
                        <a href="/courses-ui" class="font-medium text-amber-600 hover:text-amber-500">View all</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8 bg-white shadow rounded-lg p-6 border border-gray-100">
            <h2 class="text-xl font-semibold text-gray-900 mb-4">Quick Actions</h2>
            <div class="flex flex-wrap gap-4">
                <button class="bg-indigo-600 text-white px-4 py-2 rounded shadow hover:bg-indigo-700 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Add Student
                </button>
                <button class="bg-emerald-600 text-white px-4 py-2 rounded shadow hover:bg-emerald-700 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Add Book
                </button>
                <button class="bg-amber-600 text-white px-4 py-2 rounded shadow hover:bg-amber-700 transition flex items-center gap-2">
                    <i class="fas fa-plus"></i> Add Course
                </button>
            </div>
        </div>
    </div>
</body>
</html>
