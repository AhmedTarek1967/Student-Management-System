<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:fragment="html(content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <nav class="bg-indigo-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex-shrink-0 flex items-center gap-2">
                        <i class="fas fa-graduation-cap text-2xl"></i>
                        <span class="font-bold text-xl tracking-tight">SMS Pro</span>
                    </a>
                    <div class="hidden md:block">
                        <div class="ml-10 flex items-baseline space-x-8">
                            <a href="/" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition">Dashboard</a>
                            <a href="/students-ui" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition">Students</a>
                            <a href="/books-ui" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition">Books</a>
                            <a href="/courses-ui" class="px-3 py-2 rounded-md text-sm font-medium hover:bg-indigo-500 transition">Courses</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto py-6 sm:px-6 lg:px-8 w-full">
        <div th:replace="${content}"></div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-4">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-sm">
            &copy; 2026 Student Management System. Built with Spring Boot & Tailwind.
        </div>
    </footer>
</body>
</html>
